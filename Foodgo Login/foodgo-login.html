<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FoodGo – Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #E8232A;
      --red-dk: #C01920;
      --black:  #111111;
      --gray:   #F4F4F4;
      --mid:    #AAAAAA;
      --white:  #FFFFFF;
    }

    html, body { height: 100%; font-family: 'Nunito', sans-serif; }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ══ Panel izquierdo ══ */
    .panel-left {
      flex: 0 0 44%;
      background: var(--red);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 56px;
      position: relative;
      overflow: hidden;
    }

    .panel-left::before,
    .panel-left::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
    }
    .panel-left::before { width: 380px; height: 380px; bottom: -100px; right: -120px; }
    .panel-left::after  { width: 180px; height: 180px; top: 50px;     right: -50px; }

    .brand { position: relative; z-index: 1; }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 68px;
      letter-spacing: 3px;
      color: var(--white);
      line-height: 1;
    }

    .tagline {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,.72);
      margin-top: 8px;
    }

    .nav-bar {
      display: flex;
      gap: 8px;
      margin-top: 28px;
    }

    .nav-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: rgba(255,255,255,.72);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.3);
    }
    .nav-pill.active {
      background: rgba(255,255,255,.15);
      color: var(--white);
      border-color: rgba(255,255,255,.6);
    }

    .panel-illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .illus-ring {
      width: 230px; height: 230px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: 2px solid rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-footer {
      position: relative;
      z-index: 1;
    }
    .panel-footer p {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 1.5px;
      color: var(--white);
      line-height: 1.2;
    }
    .panel-footer span {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,.6);
      margin-top: 6px;
    }

    /* ══ Panel derecho ══ */
    .panel-right {
      flex: 1;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 52px 72px;
      position: relative;
    }

    .panel-right::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 95% 5%, rgba(232,35,42,.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 5% 95%, rgba(232,35,42,.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .form-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: slideUp .55s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-size: 34px;
      font-weight: 800;
      color: var(--black);
      margin-bottom: 6px;
    }
    .form-sub {
      font-size: 14px;
      color: var(--mid);
      margin-bottom: 36px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--black);
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mid);
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px 13px 44px;
      border: 2px solid #E8E8E8;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--black);
      background: var(--gray);
      transition: border-color .2s, background .2s;
      outline: none;
    }
    input:focus { border-color: var(--red); background: var(--white); }

    .row-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: -8px;
      margin-bottom: 26px;
    }
    .row-links a {
      font-size: 12px;
      font-weight: 700;
      color: var(--mid);
      text-decoration: none;
      transition: color .15s;
    }
    .row-links a:hover { color: var(--black); }
    .row-links .link-red { color: var(--red); }
    .row-links .link-red:hover { color: var(--red-dk); text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2.5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background .2s, transform .1s;
    }
    .btn-primary:hover  { background: var(--red-dk); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--mid);
      font-size: 12px;
      font-weight: 700;
    }
    .divider::before,
    .divider::after { content: ''; flex: 1; height: 1px; background: #E8E8E8; }

    .btn-google {
      width: 100%;
      padding: 13px;
      border: 2px solid #E8E8E8;
      border-radius: 10px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .btn-google:hover { border-color: #CCC; background: var(--gray); }

    .form-footer {
      text-align: center;
      margin-top: 26px;
      font-size: 13px;
      color: var(--mid);
      font-weight: 600;
    }
    .form-footer a { color: var(--red); font-weight: 800; text-decoration: none; }
    .form-footer a:hover { text-decoration: underline; }

    @media (max-width: 820px) {
      .layout { flex-direction: column; }
      .panel-left { flex: none; padding: 32px 28px 24px; }
      .panel-illustration, .panel-footer { display: none; }
      .panel-right { padding: 36px 28px; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Panel izquierdo -->
  <div class="panel-left">
    <div class="brand">
      <div class="logo">FOODGO</div>
      <div class="tagline">Tu comida favorita, cuando quieras</div>
      <div class="nav-bar">
        <div class="nav-pill active">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Restaurantes
        </div>
        <div class="nav-pill">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          Tendencia
        </div>
      </div>
    </div>

    <div class="panel-illustration">
      <div class="illus-ring">
        <svg width="115" height="115" fill="none" viewBox="0 0 80 80" stroke="white" stroke-width="1.8">
          <circle cx="40" cy="30" r="16" stroke-dasharray="4 3"/>
          <path d="M24 30 C24 48 56 48 56 30" stroke-linecap="round"/>
          <path d="M31 54 Q40 62 49 54" stroke-linecap="round"/>
          <circle cx="40" cy="30" r="5" fill="rgba(255,255,255,.2)"/>
          <line x1="40" y1="46" x2="40" y2="54" stroke-linecap="round"/>
          <path d="M15 22 Q9 29 13 37" stroke-linecap="round" stroke-width="1.3" opacity=".5"/>
          <path d="M65 22 Q71 29 67 37" stroke-linecap="round" stroke-width="1.3" opacity=".5"/>
        </svg>
      </div>
    </div>

    <div class="panel-footer">
      <p>Los mejores sabores<br>te esperan</p>
      <span>Miles de restaurantes, una sola app.</span>
    </div>
  </div>

  <!-- Panel derecho -->
  <div class="panel-right">
    <div class="form-wrap">
      <div class="form-title">Iniciar sesión</div>
      <div class="form-sub">Bienvenido de vuelta 👋</div>

      <div class="field">
        <label>Correo electrónico</label>
        <div class="input-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" placeholder="tu@correo.com"/>
        </div>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" placeholder="••••••••"/>
        </div>
      </div>

      <div class="row-links">
        <a href="#">¿Olvidaste tu contraseña?</a>
        <a href="foodgo-registro.html" class="link-red">Crear cuenta →</a>
      </div>

      <button class="btn-primary">Entrar</button>

      <div class="divider">o continúa con</div>

      <button class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </button>

      <div class="form-footer">
        ¿No tienes cuenta? <a href="foodgo-registro.html">Regístrate gratis</a>
      </div>
    </div>
  </div>

</div>
</body>
</html>
