<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FoodGo – Crear Cuenta</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #E8232A;
      --red-dk: #C01920;
      --black:  #111111;
      --gray:   #F4F4F4;
      --mid:    #AAAAAA;
      --white:  #FFFFFF;
    }

    html, body { height: 100%; font-family: 'Nunito', sans-serif; }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ══ Panel derecho (formulario va primero en registro) ══ */
    .panel-form {
      flex: 1;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 52px 72px;
      position: relative;
      order: 1;
    }

    .panel-form::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 5% 5%, rgba(232,35,42,.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 95% 95%, rgba(232,35,42,.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ══ Panel derecho (rojo) ══ */
    .panel-brand {
      flex: 0 0 40%;
      background: var(--red);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 52px;
      position: relative;
      overflow: hidden;
      order: 2;
    }

    .panel-brand::before,
    .panel-brand::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
    }
    .panel-brand::before { width: 380px; height: 380px; bottom: -100px; left: -120px; }
    .panel-brand::after  { width: 180px; height: 180px; top: 50px;     left: -50px; }

    .brand { position: relative; z-index: 1; text-align: right; }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 68px;
      letter-spacing: 3px;
      color: var(--white);
      line-height: 1;
    }
    .tagline {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,.72);
      margin-top: 8px;
    }

    .nav-bar {
      display: flex;
      gap: 8px;
      margin-top: 28px;
      justify-content: flex-end;
    }
    .nav-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: rgba(255,255,255,.72);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,.3);
    }
    .nav-pill.active {
      background: rgba(255,255,255,.15);
      color: var(--white);
      border-color: rgba(255,255,255,.6);
    }

    .panel-illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .illus-ring {
      width: 230px; height: 230px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: 2px solid rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-footer {
      position: relative;
      z-index: 1;
      text-align: right;
    }
    .panel-footer p {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 1.5px;
      color: var(--white);
      line-height: 1.2;
    }
    .panel-footer span {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,.6);
      margin-top: 6px;
    }

    /* ══ Formulario ══ */
    .form-wrap {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
      animation: slideUp .55s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .form-title {
      font-size: 34px;
      font-weight: 800;
      color: var(--black);
      margin-bottom: 6px;
    }
    .form-sub {
      font-size: 14px;
      color: var(--mid);
      margin-bottom: 32px;
    }

    /* Grid de dos columnas para nombre + apellido */
    .fields-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--black);
      margin-bottom: 7px;
    }

    .input-wrap { position: relative; }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--mid);
      pointer-events: none;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="tel"] {
      width: 100%;
      padding: 13px 14px 13px 44px;
      border: 2px solid #E8E8E8;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--black);
      background: var(--gray);
      transition: border-color .2s, background .2s;
      outline: none;
    }
    input:focus { border-color: var(--red); background: var(--white); }

    /* Checkbox términos */
    .terms {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 26px;
      margin-top: 4px;
    }

    .terms input[type="checkbox"] {
      width: 18px;
      height: 18px;
      padding: 0;
      accent-color: var(--red);
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .terms label {
      font-size: 12px;
      font-weight: 600;
      color: var(--mid);
      text-transform: none;
      letter-spacing: 0;
      margin: 0;
      cursor: pointer;
      line-height: 1.5;
    }

    .terms label a { color: var(--red); font-weight: 700; text-decoration: none; }
    .terms label a:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--red);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2.5px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background .2s, transform .1s;
    }
    .btn-primary:hover  { background: var(--red-dk); }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--mid);
      font-size: 12px;
      font-weight: 700;
    }
    .divider::before,
    .divider::after { content: ''; flex: 1; height: 1px; background: #E8E8E8; }

    .btn-google {
      width: 100%;
      padding: 13px;
      border: 2px solid #E8E8E8;
      border-radius: 10px;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .btn-google:hover { border-color: #CCC; background: var(--gray); }

    .form-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--mid);
      font-weight: 600;
    }
    .form-footer a { color: var(--red); font-weight: 800; text-decoration: none; }
    .form-footer a:hover { text-decoration: underline; }

    /* Barra de seguridad de contraseña */
    .pwd-strength {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }
    .pwd-bar {
      height: 4px;
      flex: 1;
      border-radius: 4px;
      background: #E8E8E8;
      transition: background .3s;
    }

    @media (max-width: 820px) {
      .layout { flex-direction: column; }
      .panel-brand { flex: none; order: 1; padding: 32px 28px 24px; }
      .panel-form  { order: 2; padding: 36px 28px; }
      .panel-illustration, .panel-footer { display: none; }
      .nav-bar { justify-content: flex-start; }
      .brand { text-align: left; }
      .fields-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- Panel formulario (izquierda en desktop) -->
  <div class="panel-form">
    <div class="form-wrap">
      <div class="form-title">Crear cuenta</div>
      <div class="form-sub">Únete y descubre los mejores sabores 🍔</div>

      <!-- Nombre + Apellido -->
      <div class="fields-row">
        <div class="field" style="margin-bottom:0">
          <label>Nombre</label>
          <div class="input-wrap">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" placeholder="Juan"/>
          </div>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Apellido</label>
          <div class="input-wrap">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" placeholder="Pérez"/>
          </div>
        </div>
      </div>

      <div class="field" style="margin-top:20px">
        <label>Correo electrónico</label>
        <div class="input-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" placeholder="tu@correo.com"/>
        </div>
      </div>

      <div class="field">
        <label>Teléfono</label>
        <div class="input-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .18h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.09-1.09a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7a2 2 0 011.72 2z"/>
          </svg>
          <input type="tel" placeholder="+52 664 000 0000"/>
        </div>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="pwdInput" placeholder="Mínimo 8 caracteres" oninput="updateStrength(this.value)"/>
        </div>
        <div class="pwd-strength">
          <div class="pwd-bar" id="b1"></div>
          <div class="pwd-bar" id="b2"></div>
          <div class="pwd-bar" id="b3"></div>
          <div class="pwd-bar" id="b4"></div>
        </div>
      </div>

      <div class="terms">
        <input type="checkbox" id="terms"/>
        <label for="terms">
          Acepto los <a href="#">Términos de uso</a> y la <a href="#">Política de privacidad</a> de FoodGo
        </label>
      </div>

      <button class="btn-primary">Crear mi cuenta</button>

      <div class="divider">o regístrate con</div>

      <button class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </button>

      <div class="form-footer">
        ¿Ya tienes cuenta? <a href="foodgo-login.html">Iniciar sesión</a>
      </div>
    </div>
  </div>

  <!-- Panel de marca (derecha en desktop) -->
  <div class="panel-brand">
    <div class="brand">
      <div class="logo">FOODGO</div>
      <div class="tagline">Tu comida favorita, cuando quieras</div>
      <div class="nav-bar">
        <div class="nav-pill active">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Restaurantes
        </div>
        <div class="nav-pill">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          Tendencia
        </div>
      </div>
    </div>

    <div class="panel-illustration">
      <div class="illus-ring">
        <svg width="115" height="115" fill="none" viewBox="0 0 80 80" stroke="white" stroke-width="1.8">
          <!-- Plato / usuario nuevo -->
          <circle cx="40" cy="26" r="14" stroke-dasharray="4 3"/>
          <path d="M26 26 C26 42 54 42 54 26" stroke-linecap="round"/>
          <line x1="40" y1="40" x2="40" y2="50" stroke-linecap="round"/>
          <path d="M32 50 Q40 58 48 50" stroke-linecap="round"/>
          <!-- estrella pequeña -->
          <path d="M56 14 L57.5 18 L62 18 L58.5 20.5 L60 25 L56 22 L52 25 L53.5 20.5 L50 18 L54.5 18 Z"
                fill="rgba(255,255,255,.25)" stroke="none"/>
          <!-- check circle -->
          <circle cx="18" cy="56" r="8" stroke-width="1.5" fill="rgba(255,255,255,.1)"/>
          <path d="M14 56 l3 3 6-6" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"/>
        </svg>
      </div>
    </div>

    <div class="panel-footer">
      <p>Únete a miles<br>de usuarios felices</p>
      <span>Regístrate gratis y pide en segundos.</span>
    </div>
  </div>

</div>

<script>
  function updateStrength(val) {
    const bars = [document.getElementById('b1'), document.getElementById('b2'),
                  document.getElementById('b3'), document.getElementById('b4')];
    const colors = ['#E8232A','#FF8C00','#F5C518','#22C55E'];
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    bars.forEach((b, i) => {
      b.style.background = i < score ? colors[Math.min(score-1, 3)] : '#E8E8E8';
    });
  }
</script>
</body>
</html>
